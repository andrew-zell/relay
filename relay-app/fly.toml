app = "relay-app"
primary_region = "sjc"

[build]
  [build.args]
    VITE_RELAY_API_SECRET = "relay-read-v1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
